<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact Form</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>Submit Details</h1>

      <div id="successMessage" class="success hidden">
        Submission saved successfully.
      </div>

      <div id="errorMessage" class="error hidden"></div>

      <form id="contactForm">
        <div class="form-group">
          <label for="name">Name *</label>
          <input
            type="text"
            id="name"
            name="name"
            required
            placeholder="Enter your name"
          />
          <span id="nameError" class="field-error"></span>
        </div>

        <div class="form-group">
          <label for="email">Email *</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="Enter your email"
          />
          <span id="emailError" class="field-error"></span>
        </div>

        <div class="form-group">
          <label for="id">ID *</label>
          <input
            type="text"
            id="id"
            name="id"
            required
            placeholder="Enter your ID"
          />
          <span id="idError" class="field-error"></span>
        </div>

        <div class="form-group">
          <label for="phone">Phone *</label>
          <input
            type="tel"
            id="phone"
            name="phone"
            required
            placeholder="Enter your phone number"
          />
          <span id="phoneError" class="field-error"></span>
        </div>

        <button type="submit" class="submit-button">Submit</button>
      </form>
    </div>

    <script src="script.js"></script>
  </body>
</html>
