<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact Form</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 2rem;
      }
      form {
        max-width: 420px;
      }
      label {
        display: block;
        margin-top: 1rem;
      }
      input {
        width: 100%;
        padding: 0.5rem;
      }
      button {
        margin-top: 1rem;
        padding: 0.6rem 1rem;
      }
      .errors {
        color: #b00020;
      }
      .success {
        color: #0f6b2d;
      }
    </style>
  </head>
  <body>
    <h1>Submit Details</h1>

    {% if success %}
    <p class="success">Submission saved.</p>
    {% endif %}

    {% if form.errors %}
    <p class="errors">All fields are mandatory. Please correct the highlighted fields.</p>
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <label for="id_name">Name</label>
      {{ form.name }}

      <label for="id_email">Email</label>
      {{ form.email }}

      <label for="id_id">ID</label>
      {{ form.id }}

      <label for="id_phone">Phone</label>
      {{ form.phone }}

      <button type="submit">Submit</button>
    </form>
  </body>
</html>
